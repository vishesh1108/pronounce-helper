<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Pure White Background with rounded corners for adaptive shapes -->
  <rect width="512" height="512" rx="112" fill="#ffffff" />
  
  <!-- Middle Design Graphic Group -->
  <g transform="translate(0, -10)">
    <defs>
      <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4f46e5" />
        <stop offset="100%" stop-color="#d97706" />
      </linearGradient>
      <filter id="shadow-filter" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
      </filter>
    </defs>
    
    <!-- Outer glowing container ring -->
    <circle cx="256" cy="220" r="100" fill="none" stroke="url(#brand-grad)" stroke-width="6" opacity="0.3" />
    
    <!-- Book open layout -->
    <path d="M190 240 c0-15 15-25 30-25 h36 v80 h-36 c-15 0-30 10-30 25 z" fill="url(#brand-grad)" filter="url(#shadow-filter)" />
    <path d="M322 240 c0-15-15-25-30-25 h-36 v80 h36 c-15 0 30 10 30 25 z" fill="url(#brand-grad)" filter="url(#shadow-filter)" transform="translate(512, 0) scale(-1, 1)" />
    
    <!-- Microphone in center overlapping pages -->
    <rect x="240" y="160" width="32" height="70" rx="16" fill="url(#brand-grad)" filter="url(#shadow-filter)" />
    <path d="M216 200 v10 c0 22 18 40 40 40 s40-18 40-40 v-10" fill="none" stroke="url(#brand-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="256" y1="250" x2="256" y2="285" stroke="url(#brand-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="226" y1="285" x2="286" y2="285" stroke="url(#brand-grad)" stroke-width="10" stroke-linecap="round" />
  </g>
  
  <!-- Text: English Helper -->
  <text x="256" y="445" font-family="'Outfit', 'Inter', sans-serif" font-size="42px" font-weight="800" fill="#1e293b" text-anchor="middle" letter-spacing="1.5px">ENGLISH HELPER</text>
</svg>
